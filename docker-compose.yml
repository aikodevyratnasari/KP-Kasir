services:
  app:
    user: "${UID}:${GID}"
    build:
      context: ./docker/php
      args:
        UID: ${UID}
        GID: ${GID}
    container_name: pos_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres
    networks:
      - pos_network

  nginx:
    image: nginx:alpine
    container_name: pos_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pos_network

  postgres:
    image: postgres:15
    container_name: pos_postgres
    ports:
    - "5432:5432"
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pos_network
  
  node:
    image: node:20-alpine
    container_name: node
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: sh -c "npm install && npm run dev"
    ports :
      - "5173:5173"
    networks:
      - pos_network

volumes:
  pgdata:

networks:
  pos_network:
    driver: bridge
